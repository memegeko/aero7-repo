name: deploy-pages

on:
  workflow_run:
    workflows:
      - build-packages
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Actions run ID containing the aero7-pacman-repository artifact
        required: true
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: aero7-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download repository artifact
        uses: actions/download-artifact@v4
        with:
          name: aero7-pacman-repository
          path: public
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse missing repository payload
        run: test -d public/x86_64

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
